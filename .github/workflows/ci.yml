name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      DEFAULT_ADMIN_PASSWORD: test-only-admin-password
      AUTH_REQUIRED: "true"
      META_DRY_RUN: "true"
      META_AUTOPUBLISH: "false"
      META_ALLOW_ACTIVE_LAUNCH: "false"
      META_ALLOW_PRODUCTION_REAL: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg libmagic1

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Lint Python syntax
        run: python -m compileall -q src

      - name: Run pytest suite
        run: pytest
