services:
  api:
    build:
      context: .
      target: runtime
    image: projeto-automacao-api:1.1-local
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/adintelligence.db
      AUTH_REQUIRED: "true"
      META_DRY_RUN: "true"
      META_AUTOPUBLISH: "false"
      META_ALLOW_ACTIVE_LAUNCH: "false"
      META_ALLOW_PRODUCTION_REAL: "false"
      DEFAULT_ADMIN_PASSWORD: test-only-admin-password
    volumes:
      - projeto_automacao_data:/app/data
      - projeto_automacao_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  projeto_automacao_data:
  projeto_automacao_logs:
